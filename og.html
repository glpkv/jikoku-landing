<!DOCTYPE html><html><head><meta charset="utf-8"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1200px;height:630px;overflow:hidden}
  body{background:#000;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",system-ui,sans-serif;
    color:#f5f5f7;display:flex}
  .left{width:660px;padding:74px 60px;display:flex;flex-direction:column;justify-content:center;gap:22px;position:relative;z-index:2}
  .left img{height:104px;width:auto}
  .tag{font-size:46px;font-weight:800;letter-spacing:-.02em;line-height:1.08}
  .tag .hl{background:linear-gradient(90deg,#7c8cf8,#b08cf8);-webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{font-size:22px;color:#9a9aa3;line-height:1.4}
  .right{position:absolute;right:0;top:0;width:620px;height:630px}
  .right img{width:100%;height:100%;object-fit:cover;object-position:72% center}
  .fade{position:absolute;left:0;top:0;width:260px;height:630px;
    background:linear-gradient(90deg,#000 0%,rgba(0,0,0,0) 100%);z-index:1}
</style></head>
<body>
  <div class="right"><img src="assets/welcome-banner.png"/></div>
  <div class="fade" style="left:540px"></div>
  <div class="left">
    <img src="assets/jikoku-wordmark.png"/>
    <div class="tag">One window for<br>everything you have <span class="hl">planned</span></div>
    <div class="sub">Calendar · Reminders · Exchange — on your Mac.</div>
  </div>
</body></html>
